name: 🎬 Build Marketing Video

on:
  workflow_dispatch:
    inputs:
      jobData:
        description: 'Datos del video (JSON)'
        required: true

jobs:
  build-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install gTTS (text-to-speech)
        run: pip install gtts

      - name: Parse job data
        id: parse
        run: |
          echo '${{ github.event.inputs.jobData }}' > job-data.json
          PRODUCT_NAME=$(jq -r '.productName' job-data.json)
          JOB_ID=$(jq -r '.jobId' job-data.json)
          echo "PRODUCT_NAME=$PRODUCT_NAME" >> $GITHUB_ENV
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Download video clip from Pexels
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          # Buscar un clip vertical de 5 segundos relacionado con el producto
          QUERY=$(echo "$PRODUCT_NAME" | tr ' ' '+')
          curl -H "Authorization: $PEXELS_API_KEY" \
            "https://api.pexels.com/videos/search?query=$QUERY&per_page=1&orientation=portrait" > pexels.json
          VIDEO_URL=$(jq -r '.videos[0].video_files[0].link' pexels.json)
          if [ "$VIDEO_URL" = "null" ]; then
            echo "No se encontró video, usando fallback"
            VIDEO_URL="https://player.vimeo.com/external/380341799.sd.mp4?s=..." # fallback
          fi
          curl -L "$VIDEO_URL" -o background.mp4
          # Recortar a 5 segundos (opcional)
          ffmpeg -i background.mp4 -t 5 -c copy background_5s.mp4

      - name: Generate voiceover with gTTS
        run: |
          # Crear un script corto basado en el nombre del producto
          SCRIPT="¡Descubre $PRODUCT_NAME! La mejor opción para ti. Compra ahora."
          echo "$SCRIPT" > script.txt
          gtts-cli --text "$SCRIPT" --lang es --output audio.mp3
          # Convertir a formato compatible con ffmpeg
          ffmpeg -i audio.mp3 -ar 44100 -ac 2 audio_fixed.mp3

      - name: Create subtitles file (SRT)
        run: |
          cat > subtitles.srt << EOF
          1
          00:00:00,000 --> 00:00:03,000
          ¡Descubre $PRODUCT_NAME!

          2
          00:00:03,000 --> 00:00:05,000
          La mejor opción para ti. Compra ahora.
          EOF

      - name: Build final video with FFmpeg
        run: |
          # Combinar video de fondo + audio + subtítulos quemados
          ffmpeg -i background_5s.mp4 -i audio_fixed.mp3 \
            -vf "subtitles=subtitles.srt:force_style='FontSize=24,PrimaryColour=&H00FFFFFF,OutlineColour=&H00000000,BorderStyle=1'" \
            -c:v libx264 -c:a aac -map 0:v:0 -map 1:a:0 -shortest output_video.mp4

      - name: Upload to Cloudinary
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          # Subir usando curl a Cloudinary
          curl -X POST \
            -F "file=@output_video.mp4" \
            -F "upload_preset=empire_marketing_videos" \
            -F "public_id=videos/${{ env.JOB_ID }}" \
            "https://api.cloudinary.com/v1_1/$CLOUDINARY_CLOUD_NAME/video/upload" > cloudinary.json
          VIDEO_URL=$(jq -r '.secure_url' cloudinary.json)
          echo "VIDEO_URL=$VIDEO_URL" >> $GITHUB_ENV

      - name: Notify Empire server
        run: |
          # Llamar a tu API para guardar la URL del video
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"jobId\":\"${{ env.JOB_ID }}\", \"videoUrl\":\"${{ env.VIDEO_URL }}\"}" \
            https://tu-dominio.vercel.app/api/marketing/video-callback
